# Files in the config/locales directory are used for internationalization and
# are automatically loaded by Rails. If you want to use locales other than
# English, add the necessary files in this directory.
#
# To use the locales, use `I18n.t`:
#
#     I18n.t "hello"
#
# In views, this is aliased to just `t`:
#
#     <%= t("hello") %>
#
# To use a different locale, set it with `I18n.locale`:
#
#     I18n.locale = :es
#
# This would use the information in config/locales/es.yml.
#
# To learn more about the API, please read the Rails Internationalization guide
# at https://guides.rubyonrails.org/i18n.html.
#
# Be aware that YAML interprets the following case-insensitive strings as
# booleans: `true`, `false`, `on`, `off`, `yes`, `no`. Therefore, these strings
# must be quoted to be interpreted as strings. For example:
#
#     en:
#       "yes": yup
#       enabled: "ON"

en:
  auth:
    fields:
      email: Email
      locale: Language
      password: Password
      password_confirmation: Confirm password
    locales:
      en: English
      ru: Russian
    registrations:
      created: Account created.
      heading: Create account
      invalid: Check the registration details.
      sign_in_link: Sign in
      sign_in_prompt: Already registered?
      submit: Create account
    sessions:
      created: Signed in.
      destroyed: Signed out.
      heading: Sign in
      invalid: Email or password is incorrect.
      password_reset: Forgot your password?
      require_authentication: Sign in to continue.
      sign_up_link: Create an account
      sign_up_prompt: New here?
      submit: Sign in
    password_resets:
      invalid: That password reset link is invalid or expired.
      requested: If that email exists, we sent password reset instructions.
      updated: Your password has been updated. Please sign in.
      edit:
        heading: Choose a new password
        sign_in_link: Back to sign in
        sign_in_prompt: Need the sign-in page?
        submit: Update password
      mailer:
        cta: Reset password
        greeting: Hello,
        ignore: If you did not request this, you can safely ignore this email.
        instructions: Use the link below to choose a new Routeprint password.
        subject: Reset your Routeprint password
      new:
        heading: Reset password
        sign_in_link: Back to sign in
        sign_in_prompt: Remembered it?
        submit: Send reset link
  dashboard:
    heading: Dashboard
    sign_out: Sign out
  hello: "Hello world"
