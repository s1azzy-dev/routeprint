<% database_config = BootConfig.config.database %>
default: &default
  adapter: postgis
  encoding: unicode
  seeds: false
  pool: <%= database_config.pool %>
  max_connections: <%= database_config.max_connections %>
  host: <%= database_config.host %>
  port: <%= database_config.port %>
  username: <%= database_config.username %>
  password: <%= database_config.password %>

development:
  primary: &primary
    <<: *default
    database: <%= database_config.name %>
  queue: &queue
    <<: *primary
    database: <%= database_config.queue_name %>
    migrations_paths: db/queue_migrate

test:
  primary:
    <<: *default
    database: <%= database_config.name %>
  queue:
    <<: *default
    database: <%= database_config.queue_name %>
    migrations_paths: db/queue_migrate

production:
  primary: &primary_production
    <<: *default
    database: <%= database_config.name %>
    username: <%= database_config.username %>
    password: <%= database_config.production_password %>
  cache:
    <<: *primary_production
    database: <%= database_config.cache_name %>
    migrations_paths: db/cache_migrate
  queue:
    <<: *primary_production
    database: <%= database_config.queue_name %>
    migrations_paths: db/queue_migrate
  cable:
    <<: *primary_production
    database: <%= database_config.cable_name %>
    migrations_paths: db/cable_migrate
