default: &default
  adapter: postgis
  encoding: unicode
  seeds: false
  pool: <%= ENV.fetch("DB_POOL", ENV.fetch("RAILS_MAX_THREADS", 5)) %>
  max_connections: <%= ENV.fetch("DB_MAX_CONNECTIONS", 5) %>
  host: <%= ENV.fetch("DB_HOST", "localhost") %>
  port: <%= ENV.fetch("DB_PORT", 5432) %>
  username: <%= ENV.fetch("DB_USER", "postgres") %>
  password: <%= ENV.fetch("DB_PASSWORD", "postgres") %>

development:
  primary: &primary
    <<: *default
    database: <%= ENV.fetch("DB_NAME", "routeprint_development") %>
  queue: &queue
    <<: *primary
    database: <%= ENV.fetch("DB_QUEUE_NAME", "routeprint_development_queue") %>
    migrations_paths: db/queue_migrate

test:
  primary:
    <<: *default
    database: <%= ENV.fetch("DB_NAME", "routeprint_test") %>
  queue:
    <<: *default
    database: <%= ENV.fetch("DB_QUEUE_NAME", "routeprint_test_queue") %>
    migrations_paths: db/queue_migrate

production:
  primary: &primary_production
    <<: *default
    database: <%= ENV.fetch("DB_NAME", "routeprint_production") %>
    username: <%= ENV.fetch("DB_USER", "routeprint") %>
    password: <%= ENV["ROUTEPRINT_DATABASE_PASSWORD"] %>
  cache:
    <<: *primary_production
    database: <%= ENV.fetch("DB_CACHE_NAME", "routeprint_production_cache") %>
    migrations_paths: db/cache_migrate
  queue:
    <<: *primary_production
    database: <%= ENV.fetch("DB_QUEUE_NAME", "routeprint_production_queue") %>
    migrations_paths: db/queue_migrate
  cable:
    <<: *primary_production
    database: <%= ENV.fetch("DB_CABLE_NAME", "routeprint_production_cable") %>
    migrations_paths: db/cable_migrate
