services:
  db:
    image: postgis/postgis:18-3.6
    platform: linux/amd64
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: routeprint_development
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d routeprint_development"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      dockerfile: Dockerfile.dev
      args:
        RUBY_VERSION: "4.0.5"
        NODE_VERSION: "24.18.0"
    command: >
      bash -lc "npm ci &&
      bundle install &&
      bin/rails db:prepare &&
      rm -f tmp/pids/server.pid &&
      bin/dev"
    environment:
      RAILS_ENV: development
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      VITE_HMR_CLIENT_PORT: 3038
    ports:
      - "3001:3000"
      - "3038:3036"
    volumes:
      - .:/app
      - bundle_data:/usr/local/bundle
      - node_modules_data:/app/node_modules
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:3000/up || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 45s
    depends_on:
      db:
        condition: service_healthy

  jobs:
    build:
      context: .
      dockerfile: Dockerfile.dev
      args:
        RUBY_VERSION: "4.0.5"
        NODE_VERSION: "24.18.0"
    command: >
      bash -lc "bundle install &&
      bin/rails db:prepare &&
      bin/jobs"
    environment:
      RAILS_ENV: development
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
    volumes:
      - .:/app
      - bundle_data:/usr/local/bundle
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
  bundle_data:
  node_modules_data:
