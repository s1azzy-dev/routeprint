    category: domain
    positive:
      - "Добавь поиск airport в радиусе"
      - "Построй bounds для маршрутов на карте"
    negative:
      - "Измени password policy"
      - "Обнови текст в README"
  - id: routeprint-yabi-interactor
    category: domain
    positive:
      - "Вынеси orchestration создания flight из controller в use case"
      - "Добавь failure code при неизвестном airport"
    negative:
      - "Исправь отступ у кнопки входа"
      - "Обнови TODO"
