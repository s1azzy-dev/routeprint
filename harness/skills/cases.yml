version: 1
scope: routeprint-project-skills
note: Generated OpenSpec adapters are command wrappers and are covered by their own tooling specs.
skills:
  - id: routeprint-sdd-intake-gate
    category: router
    positive:
      - "Требования к новой функции неоднозначны и могут затронуть схему или безопасность"
      - "После compaction нужно восстановить уровень SDD и следующий workflow"
    negative:
      - "Исправь опечатку в документации"
      - "Обнови цвет кнопки без изменения поведения"
  - id: routeprint-spec-driven-change
    category: router
    positive:
      - "Добавь новую пользовательскую возможность с несколькими взаимодействующими механизмами"
      - "Нужно принять durable архитектурное решение и оформить OpenSpec с ADR"
    negative:
      - "Обнови TODO"
      - "Исправь форматирование Ruby-файла"
